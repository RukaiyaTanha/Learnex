{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ username }} | Profile</title>
<link rel="stylesheet" href="{% static 'accounts/profile.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container profile-container">
    <div class="top-bar">
        <h1>Profile</h1>
        <div class="profile-actions">
            <a href="{% url 'profile_edit' %}" class="edit-btn"><i class="fas fa-edit"></i> Edit</a>
            <a href="{% url 'student_dashboard' %}" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>

    <div class="profile-card">
        <div class="profile-icon"><i class="fas fa-user-circle"></i></div>
        <div class="profile-details">
            <p><strong>Name:</strong> {{ username }}</p>
            <p><strong>Email:</strong> {{ email }}</p>
            <p><strong>Role:</strong> {{ role }}</p>
            <p><strong>Joined:</strong> {{ date_joined|date:"F j, Y" }}</p>
        </div>
    </div>
</div>
</body>
</html>
