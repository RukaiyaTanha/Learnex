databases:
  - name: learnex-postgres
    plan: starter

services:
  - type: web
    name: learnex-web
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && python manage.py showmigrations accounts && python manage.py migrate --noinput --fake-initial && python manage.py import_course_catalog && python manage.py showmigrations accounts && python manage.py collectstatic --noinput"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: learnex-postgres
          property: connectionString
      - key: DB_ENGINE
        value: postgresql
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
